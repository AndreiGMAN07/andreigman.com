<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}}</title>
  <meta name="description" content="{{description}}" />
  <meta property="og:title" content="{{ogtitle}}" />
  <meta property="og:description" content="{{ogdesc}}" />
  <meta property="og:url" content="{{ogurl}}" />
  <meta property="og:type" content="{{ogtype}}" />
  <meta property="og:image" content="{{ogimage}}" />
  <meta name="twitter:card" content="summary" />
  <link rel="icon" href="{{base}}favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="{{base}}favicon.svg" />
  <link rel="stylesheet" href="{{base}}assets/css/style.css?v=5" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css" media="screen" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js" onload="document.querySelectorAll('pre code').forEach((b) => { hljs.highlightElement(b); })"></script>
  {{extrahead}}
  <script>
    (function(){var t=localStorage.getItem("site-theme");if(t)document.documentElement.setAttribute("data-theme",t);})();
  </script>
</head>
